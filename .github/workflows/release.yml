name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package plugin
        run: |
          zip -r ltsteamplugin.zip backend public .millennium plugin.json readme.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ltsteamplugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
